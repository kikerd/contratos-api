nombre: datosYBioXNombre
url: /ServiciosIDGuatemala/ConsultaV2/datosYBioXNombre
metodo: POST
autorizacion: Application Bearer Token
descripcion: >-
  Servicio rest que consulta datos y biométricos del cliente mediante el nombre
entrada:
  content_type: application/x-www-form-urlencoded
  parametros:
    - nombre: ipAutenticacion
      tipo_dato: String
      nulo: No
      descripcion: |
        Ip de donde se consumirá el servicio
      ejemplo: |
        ipAutenticacion=ip desde donde consumiran
    - nombre: usuarioAutenticacion
      tipo_dato: String
      nulo: No
      descripcion: |
        Usuario asignado
      ejemplo: |
        usuarioAutenticacion=usuario asignado
    - nombre: nombre
      tipo_dato: String
      nulo: No
      longitud_maxima: 50
      descripcion: |
        Nombre del cliente
      ejemplo: |
        Nombre=IRMA PATRICIA
    - nombre: apellidoPaterno
      tipo_dato: String
      nulo: No
      longitud_maxima: 50
      descripcion: |
        apellidoPaterno del cliente
      ejemplo: |
        apellidoPaterno=DE LA LUZ
    - nombre: apellidoMaterno
      tipo_dato: String
      nulo: Yes
      longitud_maxima: 50
      descripcion: |
        Ip de donde se consumirá el servicio
      ejemplo: |
        apellidoMaterno=PAZ
    - nombre: fechaNacimiento
      tipo_dato: String
      nulo: Yes
      descripcion: |
        Fecha de nacimiento “yyyy-mm-dd
      ejemplo: |
        fechaNacimiento=1977-04-06
    - nombre: altaUnica
      tipo_dato: String
      nulo: Yes
      longitud_maxima: 1
      descripcion: |
        Valor de alta única
      ejemplo: |
        altaUnica=”X”


  ejemplos:
    - nombre=IRMA PATRICIA&apellidoPaterno=DE LA LUZ&apellidoMaterno=PAZ&fechaNacimiento=1977-04-06&ipAutenticacion= ip desde donde consumiran&usuarioAutenticacion=usuario asignado

